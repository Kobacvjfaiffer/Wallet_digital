<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuardPal - Iniciar Sesión</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            transition: transform 0.2s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card login-card">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <h1 class="h3 mb-3">🛡️ GuardPal</h1>
                            <p class="text-muted">Inicia sesión en tu cuenta</p>
                        </div>
                        
                        <div id="loginMessage"></div>
                        
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="password" class="form-label">Contraseña</label>
                                <input type="password" class="form-control" id="password" required>
                            </div>
                            
                            <button type="submit" class="btn btn-login w-100 py-2" id="submitBtn">
                                Iniciar sesión
                            </button>
                        </form>
                        
                        <hr class="my-4">
                        
                        <div class="text-center">
                            <a href="register.html" class="text-decoration-none">¿No tienes cuenta? Regístrate</a>
                        </div>
                        
                        <div class="alert alert-info mt-3 small text-center">
                            <strong>📝 Demo:</strong> victor@gmail.com / 12345
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // LOGIN FUNCIONAL
        // Crear usuario demo si no existe
        let users = JSON.parse(localStorage.getItem('guardpal_users') || '[]');
        if (users.length === 0) {
            users = [{
                id: 1,
                name: 'Víctor',
                email: 'victor@gmail.com',
                password: '12345',
                createdAt: new Date().toISOString()
            }];
            localStorage.setItem('guardpal_users', JSON.stringify(users));
            
            // Crear transacciones demo
            const demoTransactions = [{
                id: Date.now(),
                type: 'deposit',
                amount: 1000,
                currency: 'USD',
                date: new Date().toISOString().split('T')[0],
                status: 'completed',
                description: 'Depósito inicial'
            }];
            localStorage.setItem('guardpal_transactions_1', JSON.stringify(demoTransactions));
        }
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('loginMessage');
            const submitBtn = document.getElementById('submitBtn');
            
            function showMessage(msg, isError) {
                const className = isError ? 'alert-danger' : 'alert-success';
                messageDiv.innerHTML = `<div class="alert ${className}">${msg}</div>`;
                setTimeout(() => messageDiv.innerHTML = '', 3000);
            }
            
            if (!email || !password) {
                showMessage('❌ Completa todos los campos', true);
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = 'Validando...';
            
            // Buscar usuario
            const users = JSON.parse(localStorage.getItem('guardpal_users') || '[]');
            const user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                // Guardar sesión
                const session = {
                    user: {
                        id: user.id,
                        name: user.name,
                        email: user.email
                    },
                    token: btoa(email + Date.now()),
                    expiresAt: Date.now() + 86400000
                };
                sessionStorage.setItem('guardpal_auth', JSON.stringify(session));
                
                // Cargar transacciones del usuario
                const userTransactions = localStorage.getItem(`guardpal_transactions_${user.id}`);
                if (userTransactions) {
                    localStorage.setItem('guardpal_transactions', userTransactions);
                }
                
                showMessage('✅ Login exitoso! Redirigiendo...', false);
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            } else {
                showMessage('❌ Email o contraseña incorrectos', true);
                document.getElementById('password').value = '';
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Iniciar sesión';
            }
        });
        
        // Verificar si ya hay sesión
        const sesion = sessionStorage.getItem('guardpal_auth');
        if (sesion) {
            try {
                const data = JSON.parse(sesion);
                if (Date.now() < data.expiresAt) {
                    window.location.href = 'dashboard.html';
                }
            } catch(e) {}
        }
    </script>
</body>
</html>
