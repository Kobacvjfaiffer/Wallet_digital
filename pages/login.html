<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuardPal - Iniciar Sesión</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card login-card">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <h1 class="h3 mb-3">🛡️ GuardPal</h1>
                            <p class="text-muted">Inicia sesión en tu cuenta</p>
                        </div>
                        
                        <div id="loginMessage"></div>
                        
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" 
                                       class="form-control" 
                                       id="email" 
                                       name="email"
                                       placeholder="usuario@ejemplo.com"
                                       value="victor@gmail.com"
                                       required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="password" class="form-label">Contraseña</label>
                                <input type="password" 
                                       class="form-control" 
                                       id="password" 
                                       name="password"
                                       value="12345"
                                       required>
                            </div>
                            
                            <button type="submit" class="btn btn-login btn-primary w-100 py-2" id="submitBtn">
                                Iniciar sesión
                            </button>
                        </form>
                        
                        <hr class="my-4">
                        
                        <div class="text-center">
                            <a href="register.html" class="text-decoration-none">¿No tienes cuenta? Regístrate</a>
                        </div>
                        
                        <div class="alert alert-info mt-3 small text-center">
                            <strong>📝 Demo:</strong> victor@gmail.com / 12345
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- VERSIÓN SIMPLIFICADA QUE FUNCIONA -->
    <script>
        // Este es el mismo código que funcionó en test-directo
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const messageDiv = document.getElementById('loginMessage');
        const submitBtn = document.getElementById('submitBtn');
        
        function mostrarMensaje(texto, tipo) {
            const alertClass = tipo === 'success' ? 'alert-success' : 
                              tipo === 'danger' ? 'alert-danger' : 'alert-warning';
            
            messageDiv.innerHTML = `
                <div class="alert ${alertClass} alert-dismissible fade show" role="alert">
                    ${texto}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            
            setTimeout(() => {
                if (messageDiv.innerHTML) messageDiv.innerHTML = '';
            }, 3000);
        }
        
        function setLoading(isLoading) {
            submitBtn.disabled = isLoading;
            if (isLoading) {
                submitBtn.innerHTML = `
                    <span class="spinner-border spinner-border-sm me-2" role="status"></span>
                    Validando...
                `;
            } else {
                submitBtn.innerHTML = 'Iniciar sesión';
            }
        }
        
        async function hacerLogin(email, password) {
            // Simular delay
            await new Promise(resolve => setTimeout(resolve, 800));
            
            // CREDENCIALES CORRECTAS
            return email === 'victor@gmail.com' && password === '12345';
        }
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim().toLowerCase();
            const password = passwordInput.value;
            
            if (!email || !password) {
                mostrarMensaje('Por favor completa todos los campos', 'warning');
                return;
            }
            
            setLoading(true);
            
            try {
                const esValido = await hacerLogin(email, password);
                
                if (esValido) {
                    // Crear sesión (MISMO CÓDIGO QUE FUNCIONÓ)
                    const userData = {
                        id: 1,
                        name: email.split('@')[0],
                        email: email,
                        role: 'user',
                        loginTime: new Date().toISOString()
                    };
                    
                    const token = btoa(`${email}:${Date.now()}`);
                    
                    const session = {
                        user: userData,
                        token: token,
                        expiresAt: Date.now() + (24 * 60 * 60 * 1000)
                    };
                    
                    sessionStorage.setItem('guardpal_auth', JSON.stringify(session));
                    
                    console.log('✅ Sesión guardada:', session);
                    mostrarMensaje('✅ Login exitoso! Redirigiendo...', 'success');
                    
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                    
                } else {
                    mostrarMensaje('❌ Email o contraseña incorrectos', 'danger');
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            } catch (error) {
                console.error('Error:', error);
                mostrarMensaje('Error de conexión. Intenta de nuevo.', 'danger');
            } finally {
                setLoading(false);
            }
        });
        
        // Verificar si ya hay sesión
        const sesionExistente = sessionStorage.getItem('guardpal_auth');
        if (sesionExistente) {
            console.log('Sesión existente detectada');
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1000);
        }
    </script>
</body>
</html>
