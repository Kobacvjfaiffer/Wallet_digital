<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-0.5" y="-0.5" width="2" height="2">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge> 
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/> 
      </feMerge>
    </filter>
  </defs>
  
  <!-- Círculo de fondo con gradiente -->
  <circle cx="100" cy="100" r="95" fill="url(#gradient)" stroke="white" stroke-width="2" filter="url(#shadow)"/>
  
  <!-- Escudo -->
  <path d="M100,40 L130,55 L130,95 C130,125 115,145 100,155 C85,145 70,125 70,95 L70,55 L100,40Z" 
        fill="white" 
        stroke="none"
        opacity="0.95"/>
  
  <!-- Candado -->
  <rect x="85" y="90" width="30" height="40" rx="5" fill="#2d3748" stroke="none"/>
  <rect x="92" y="100" width="16" height="20" rx="2" fill="white" stroke="none"/>
  <circle cx="100" cy="90" r="12" fill="none" stroke="#2d3748" stroke-width="3"/>
  <circle cx="100" cy="90" r="8" fill="white" stroke="none"/>
  
  <!-- Letra G estilizada -->
  <text x="100" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" stroke="none">G</text>
  
  <!-- Detalles decorativos -->
  <circle cx="100" cy="65" r="4" fill="white" opacity="0.8"/>
  <circle cx="115" cy="72" r="3" fill="white" opacity="0.6"/>
  <circle cx="85" cy="72" r="3" fill="white" opacity="0.6"/>
</svg>